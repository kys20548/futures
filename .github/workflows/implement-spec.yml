name: Implement Spec

on:
  push:
    paths:
      - 'specs/**/*.md'
  workflow_dispatch:
    inputs:
      spec_file:
        description: 'Spec file to implement (e.g. specs/001-lead-order-placement.md)'
        required: true
        type: string

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Detect changed specs
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "${{ inputs.spec_file }}" > changed_specs.txt
          else
            git diff HEAD~1 --name-only | grep '^specs/' | grep '\.md$' > changed_specs.txt || true
          fi
          echo "Changed specs:"
          cat changed_specs.txt

      - name: Clone futures-api
        env:
          DEPLOY_KEY: ${{ secrets.FUTURES_API_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 ec2-15-220-82-33.ap-northeast-1.compute.amazonaws.com >> ~/.ssh/known_hosts
          git clone git@ec2-15-220-82-33.ap-northeast-1.compute.amazonaws.com:firebit/backend/futures.git /tmp/futures

      - name: Run Implementation Agent per spec
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FUTURES_REPO_PATH: /tmp/futures
        run: |
          while IFS= read -r spec; do
            [ -z "$spec" ] && continue
            echo "=== Implementing spec: $spec ==="
            bash scripts/implement-spec.sh "$spec"
          done < changed_specs.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: implementation-logs
          path: /tmp/impl-logs/
          retention-days: 7
